<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨氏双缝干涉实验 - 交互式动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '苹方', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }

        .canvas-container {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        canvas {
            display: block;
            width: 100%;
        }

        .controls {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
            font-size: 0.9em;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(to right, #e0e0e0, #c0c0c0);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
            transition: all 0.2s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.5);
        }

        .value-display {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-left: 8px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        button.secondary {
            background: #2196F3;
        }

        button.secondary:hover {
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .info-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.85em;
        }

        .info-panel h3 {
            margin-bottom: 8px;
            font-size: 1em;
        }

        .info-panel p {
            margin: 4px 0;
            line-height: 1.4;
        }

        .formula {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px;
            border-radius: 5px;
            margin: 4px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 杨氏双缝干涉实验</h1>
        <p class="subtitle">拖动滑块调节参数，观察纯双缝干涉图样的实时变化</p>
        
        <div class="main-content">
            <div class="canvas-container">
                <canvas id="mainCanvas"></canvas>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>
                        🌈 波长 λ: <span class="value-display" id="wavelengthValue">550 nm</span>
                    </label>
                    <input type="range" id="wavelength" min="380" max="780" value="550" step="5">
                </div>

                <div class="control-group">
                    <label>
                        📏 缝间距 d: <span class="value-display" id="slitDistanceValue">0.50 mm</span>
                    </label>
                    <input type="range" id="slitDistance" min="0.1" max="2.0" value="0.5" step="0.05">
                </div>

                <div class="control-group">
                    <label>
                        📐 屏幕距离 L: <span class="value-display" id="screenDistanceValue">1.00 m</span>
                    </label>
                    <input type="range" id="screenDistance" min="0.3" max="3.0" value="1.0" step="0.1">
                </div>

                <div class="button-group">
                    <button onclick="resetParameters()">🔄 重置参数</button>
                    <button class="secondary" onclick="downloadImage()">💾 保存图片</button>
                </div>

                <div class="info-panel">
                    <h3>📖 双缝干涉原理</h3>
                    <p><strong>光程差：</strong></p>
                    <div class="formula">δ = d·sinθ ≈ d·y/L</div>
                    <p><strong>明纹条件：</strong></p>
                    <div class="formula">d·sinθ = mλ (m = 0, ±1, ±2...)</div>
                    <p><strong>条纹间距：</strong></p>
                    <div class="formula">Δy = λL / d</div>
                    <p style="margin-top:8px; font-size:0.85em;">
                        💡 改变波长 → 颜色变化<br>
                        💡 增大d或减小L → 条纹变密
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            // 增加高度，让三个区域更舒展
            canvas.width = width;
            canvas.height = Math.max(width * 0.9, 600);
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        function wavelengthToColor(wavelength) {
            let r, g, b;
            
            if (wavelength >= 380 && wavelength < 440) {
                r = -(wavelength - 440) / (440 - 380);
                g = 0;
                b = 1;
            } else if (wavelength >= 440 && wavelength < 490) {
                r = 0;
                g = (wavelength - 440) / (490 - 440);
                b = 1;
            } else if (wavelength >= 490 && wavelength < 510) {
                r = 0;
                g = 1;
                b = -(wavelength - 510) / (510 - 490);
            } else if (wavelength >= 510 && wavelength < 580) {
                r = (wavelength - 510) / (580 - 510);
                g = 1;
                b = 0;
            } else if (wavelength >= 580 && wavelength < 645) {
                r = 1;
                g = -(wavelength - 645) / (645 - 580);
                b = 0;
            } else if (wavelength >= 645 && wavelength <= 780) {
                r = 1;
                g = 0;
                b = 0;
            } else {
                r = 0; g = 0; b = 0;
            }

            let factor;
            if (wavelength >= 380 && wavelength < 420) {
                factor = 0.3 + 0.7 * (wavelength - 380) / (420 - 380);
            } else if (wavelength >= 420 && wavelength <= 700) {
                factor = 1;
            } else if (wavelength > 700 && wavelength <= 780) {
                factor = 0.3 + 0.7 * (780 - wavelength) / (780 - 700);
            } else {
                factor = 0;
            }

            r = Math.round(255 * Math.pow(r * factor, 0.8));
            g = Math.round(255 * Math.pow(g * factor, 0.8));
            b = Math.round(255 * Math.pow(b * factor, 0.8));

            return { r, g, b };
        }

        function calculateIntensity(x, wavelength, d, L) {
            const k = 2 * Math.PI / wavelength;
            const sinTheta = x / Math.sqrt(x * x + L * L);
            const alpha = k * d * sinTheta / 2;
            return Math.cos(alpha) * Math.cos(alpha);
        }

        function draw() {
            const width = canvas.width;
            const height = canvas.height;
            
            const wavelength = parseFloat(document.getElementById('wavelength').value) * 1e-9;
            const d = parseFloat(document.getElementById('slitDistance').value) * 1e-3;
            const L = parseFloat(document.getElementById('screenDistance').value);
            
            document.getElementById('wavelengthValue').textContent = (wavelength * 1e9).toFixed(0) + ' nm';
            document.getElementById('slitDistanceValue').textContent = (d * 1e3).toFixed(2) + ' mm';
            document.getElementById('screenDistanceValue').textContent = L.toFixed(2) + ' m';
            
            // 白色背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            
            const fringeSpacing = (wavelength * L) / d * 1000;
            
            // 将画布分成三个区域，间距更大
            const margin = height * 0.02;
            const setupHeight = height * 0.32;
            const curveHeight = height * 0.28;
            const fringeHeight = height * 0.28;
            
            const setupY = margin;
            const curveY = setupY + setupHeight + margin * 1.5;
            const fringeY = curveY + curveHeight + margin * 1.5;
            
            // 绘制三个区域
            drawSetup(width, setupHeight, setupY, d, L);
            drawIntensityCurve(width, curveHeight, curveY, wavelength, d, L, fringeSpacing);
            drawFringePattern(width, fringeHeight, fringeY, wavelength, d, L, fringeSpacing);
        }

        function drawSetup(width, height, startY, d, L) {
            const barrierX = width * 0.4;
            const screenX = width * 0.85;
            const sourceX = width * 0.08;
            const centerY = startY + height / 2;
            
            // 标题
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('实验装置示意图', width / 2, startY + 15);
            
            // 调整后的绘制区域
            const drawTop = startY + 25;
            const drawBottom = startY + height - 25;
            const drawHeight = drawBottom - drawTop;
            const drawCenterY = (drawTop + drawBottom) / 2;
            
            // 缝间距像素
            const slitPixelSpacing = Math.max(d * 15000, 6);
            const maxSlitSpacing = drawHeight * 0.5;
            const actualSlitSpacing = Math.min(slitPixelSpacing, maxSlitSpacing);
            
            const slitY1 = drawCenterY - actualSlitSpacing / 2;
            const slitY2 = drawCenterY + actualSlitSpacing / 2;
            
            // 光源
            const gradient = ctx.createRadialGradient(sourceX, drawCenterY, 0, sourceX, drawCenterY, 18);
            gradient.addColorStop(0, '#FFD700');
            gradient.addColorStop(0.3, '#FFA500');
            gradient.addColorStop(0.7, 'rgba(255, 165, 0, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 165, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(sourceX, drawCenterY, 18, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(sourceX, drawCenterY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#FF8C00';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = '#333';
            ctx.font = '11px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('光源 S', sourceX, drawCenterY - 20);
            
            // 入射光线
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 3]);
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.moveTo(sourceX + 7, drawCenterY);
            ctx.lineTo(barrierX - 5, slitY1);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(sourceX + 7, drawCenterY);
            ctx.lineTo(barrierX - 5, slitY2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
            
            // 双缝屏障
            const barrierWidth = 10;
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(barrierX - barrierWidth/2, drawTop, barrierWidth, drawHeight);
            ctx.strokeStyle = '#1a252f';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(barrierX - barrierWidth/2, drawTop, barrierWidth, drawHeight);
            
            // 两个缝
            const slitW = 3;
            const slitLen = 12;
            
            // S₁
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(barrierX - slitW/2, slitY1 - slitLen/2, slitW, slitLen);
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 1;
            ctx.strokeRect(barrierX - slitW/2, slitY1 - slitLen/2, slitW, slitLen);
            
            // S₂
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(barrierX - slitW/2, slitY2 - slitLen/2, slitW, slitLen);
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 1;
            ctx.strokeRect(barrierX - slitW/2, slitY2 - slitLen/2, slitW, slitLen);
            
            // 缝标签
            ctx.fillStyle = '#4CAF50';
            ctx.font = 'bold 11px "Microsoft YaHei"';
            ctx.textAlign = 'right';
            ctx.fillText('S₁', barrierX - 15, slitY1 + 4);
            ctx.fillText('S₂', barrierX - 15, slitY2 + 4);
            
            // 缝间距标注
            const annotateX = barrierX + 16;
            ctx.strokeStyle = '#E74C3C';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();
            ctx.moveTo(annotateX, slitY1);
            ctx.lineTo(annotateX, slitY2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 小箭头
            drawSmallArrow(ctx, annotateX, slitY1 + 2, annotateX, slitY2 - 2, '#E74C3C', 5);
            drawSmallArrow(ctx, annotateX, slitY2 - 2, annotateX, slitY1 + 2, '#E74C3C', 5);
            
            ctx.fillStyle = '#E74C3C';
            ctx.font = '10px "Microsoft YaHei"';
            ctx.textAlign = 'left';
            ctx.fillText(`d = ${(d * 1e3).toFixed(2)} mm`, annotateX + 6, (slitY1 + slitY2) / 2 + 3);
            
            // 屏障标签
            ctx.fillStyle = '#2c3e50';
            ctx.font = '10px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('双缝屏', barrierX, drawBottom + 12);
            
            // 屏幕
            ctx.fillStyle = '#95a5a6';
            ctx.fillRect(screenX - 5, drawTop, 10, drawHeight);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(screenX - 5, drawTop, 10, drawHeight);
            
            // 在屏幕上绘制干涉条纹！
            const screenLeft = screenX - 5;
            const fringeStartY = drawTop + 3;
            const fringeEndY = drawBottom - 3;
            const fringeDrawHeight = fringeEndY - fringeStartY;
            
            const wavelength = parseFloat(document.getElementById('wavelength').value) * 1e-9;
            const color = wavelengthToColor(wavelength * 1e9);
            
            // 在屏幕上绘制条纹
            const displayRange = 20; // mm
            for (let py = 0; py < fringeDrawHeight; py++) {
                const screenY = -displayRange/2 + (displayRange * py) / fringeDrawHeight;
                const intensity = calculateIntensity(screenY * 1e-3, wavelength, d, L);
                ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${intensity})`;
                ctx.fillRect(screenLeft, fringeStartY + py, 10, 1);
            }
            
            // 屏幕标签
            ctx.fillStyle = '#333';
            ctx.font = '10px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('观察屏', screenX, drawBottom + 12);
            
            // 干涉光线
            const numRays = 7;
            const raySpread = drawHeight * 0.9;
            for (let i = 0; i < numRays; i++) {
                const targetY = drawCenterY + (i - Math.floor(numRays/2)) * raySpread / Math.floor(numRays/2);
                const opacity = 0.12;
                
                ctx.strokeStyle = `rgba(255, 200, 0, ${opacity})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(barrierX + 3, slitY1);
                ctx.lineTo(screenX - 4, targetY);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(barrierX + 3, slitY2);
                ctx.lineTo(screenX - 4, targetY);
                ctx.stroke();
            }
            
            // 距离标注
            const labelY = drawBottom + 20;
            ctx.strokeStyle = '#2196F3';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 2]);
            ctx.beginPath();
            ctx.moveTo(barrierX, labelY);
            ctx.lineTo(screenX, labelY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            drawSmallArrow(ctx, barrierX + 4, labelY, screenX - 4, labelY, '#2196F3', 6);
            drawSmallArrow(ctx, screenX - 4, labelY, barrierX + 4, labelY, '#2196F3', 6);
            
            ctx.fillStyle = '#2196F3';
            ctx.font = 'bold 11px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText(`L = ${L.toFixed(2)} m`, (barrierX + screenX) / 2, labelY - 10);
        }

        function drawSmallArrow(ctx, fromX, fromY, toX, toY, color, size) {
            const angle = Math.atan2(toY - fromY, toX - fromX);
            const headLength = size;
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(
                toX - headLength * Math.cos(angle - Math.PI / 6),
                toY - headLength * Math.sin(angle - Math.PI / 6)
            );
            ctx.lineTo(
                toX - headLength * Math.cos(angle + Math.PI / 6),
                toY - headLength * Math.sin(angle + Math.PI / 6)
            );
            ctx.closePath();
            ctx.fill();
        }

        function drawIntensityCurve(width, height, startY, wavelength, d, L, fringeSpacing) {
            const color = wavelengthToColor(wavelength * 1e9);
            const displayRange = 20;
            
            const margin = 50;
            const curveLeft = margin;
            const curveRight = width - margin;
            const curveWidth = curveRight - curveLeft;
            const curveTop = startY;
            const curveBottom = startY + height;
            const axisY = curveBottom - 25;
            const curveHeight = axisY - curveTop - 10;
            
            // 标题
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('强度分布曲线 I(y) = I₀ cos²(πdy/λL)', width / 2, curveTop + 15);
            
            // 坐标轴
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(curveLeft, axisY);
            ctx.lineTo(curveRight, axisY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(curveLeft, curveTop + 25);
            ctx.lineTo(curveLeft, axisY);
            ctx.stroke();
            
            // 轴标签
            ctx.fillStyle = '#666';
            ctx.font = '10px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('屏幕位置 y (mm)', width / 2, curveBottom - 5);
            
            ctx.save();
            ctx.translate(curveLeft - 25, curveTop + curveHeight/2 + 15);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('相对强度 I/I₀', 0, 0);
            ctx.restore();
            
            // X轴刻度
            ctx.fillStyle = '#999';
            ctx.font = '8px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            for (let tick = -10; tick <= 10; tick += 2) {
                const tickX = curveLeft + curveWidth * (tick + 10) / 20;
                ctx.beginPath();
                ctx.moveTo(tickX, axisY);
                ctx.lineTo(tickX, axisY + 4);
                ctx.stroke();
                ctx.fillText(tick, tickX, axisY + 12);
            }
            
            // 强度刻度
            ctx.fillStyle = '#999';
            ctx.font = '8px "Microsoft YaHei"';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 4; i++) {
                const iy = axisY - (curveHeight * i / 4);
                ctx.fillText((i/4).toFixed(2), curveLeft - 5, iy + 3);
                if (i > 0) {
                    ctx.setLineDash([2, 2]);
                    ctx.strokeStyle = '#eee';
                    ctx.beginPath();
                    ctx.moveTo(curveLeft, iy);
                    ctx.lineTo(curveRight, iy);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.strokeStyle = '#999';
                }
            }
            
            // 强度曲线
            ctx.beginPath();
            ctx.strokeStyle = `rgb(${color.r},${color.g},${color.b})`;
            ctx.lineWidth = 2;
            
            const points = 400;
            let firstPoint = true;
            
            for (let i = 0; i <= points; i++) {
                const screenX = -displayRange/2 + (displayRange * i) / points;
                const intensity = calculateIntensity(screenX * 1e-3, wavelength, d, L);
                const xPos = curveLeft + curveWidth * i / points;
                const yPos = axisY - intensity * curveHeight;
                
                if (firstPoint) {
                    ctx.moveTo(xPos, yPos);
                    firstPoint = false;
                } else {
                    ctx.lineTo(xPos, yPos);
                }
            }
            ctx.stroke();
            
            // 填充
            ctx.lineTo(curveRight, axisY);
            ctx.lineTo(curveLeft, axisY);
            ctx.closePath();
            ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},0.1)`;
            ctx.fill();
        }

        function drawFringePattern(width, height, startY, wavelength, d, L, fringeSpacing) {
            const color = wavelengthToColor(wavelength * 1e9);
            const displayRange = 20;
            
            const margin = 50;
            const fringeLeft = margin;
            const fringeRight = width - margin;
            const fringeWidth = fringeRight - fringeLeft;
            const fringeTop = startY;
            const fringeBottom = startY + height;
            
            // 标题
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('干涉条纹（实际颜色）', width / 2, fringeTop + 15);
            
            // 条纹区域
            const drawTop = fringeTop + 25;
            const drawHeight = fringeBottom - drawTop - 30;
            
            // 背景边框
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(fringeLeft, drawTop, fringeWidth, drawHeight);
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.strokeRect(fringeLeft, drawTop, fringeWidth, drawHeight);
            
            // 绘制条纹
            for (let i = 0; i < fringeWidth; i++) {
                const screenX = -displayRange/2 + (displayRange * i) / fringeWidth;
                const intensity = calculateIntensity(screenX * 1e-3, wavelength, d, L);
                ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},${intensity})`;
                ctx.fillRect(fringeLeft + i, drawTop, 1, drawHeight);
            }
            
            // 中心线
            const centerX = fringeLeft + fringeWidth / 2;
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(centerX, drawTop);
            ctx.lineTo(centerX, drawTop + drawHeight);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#333';
            ctx.font = '9px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('0级 (中心)', centerX, drawTop + drawHeight + 12);
            
            // 刻度
            ctx.fillStyle = '#666';
            ctx.font = '8px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            for (let tick = -10; tick <= 10; tick += 2) {
                const tickX = fringeLeft + fringeWidth * (tick + 10) / 20;
                ctx.beginPath();
                ctx.moveTo(tickX, drawTop + drawHeight);
                ctx.lineTo(tickX, drawTop + drawHeight + 5);
                ctx.stroke();
                ctx.fillText(tick + 'mm', tickX, drawTop + drawHeight + 15);
            }
            
            // 条纹间距信息
            ctx.fillStyle = '#4CAF50';
            ctx.font = 'bold 11px "Microsoft YaHei"';
            ctx.textAlign = 'right';
            ctx.fillText(`✨ Δy = λL/d = ${fringeSpacing.toFixed(2)} mm`, fringeRight, fringeTop + 15);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'youngs-double-slit-interference.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function resetParameters() {
            document.getElementById('wavelength').value = 550;
            document.getElementById('slitDistance').value = 0.5;
            document.getElementById('screenDistance').value = 1.0;
            draw();
        }

        ['wavelength', 'slitDistance', 'screenDistance'].forEach(id => {
            document.getElementById(id).addEventListener('input', draw);
        });

        draw();
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });
    </script>
</body>
</html>
